services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile
    image: scalor-caddy-cloudflare:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 / QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data      # certificats TLS (Let's Encrypt)
      - caddy_config:/config  # config Caddy
    environment:
      - CADDY_ASK_URL=${CADDY_ASK_URL:-https://api.scalor.net/api/caddy/check-domain}
      - CADDY_AUTH_TOKEN=${CADDY_AUTH_TOKEN:?CADDY_AUTH_TOKEN is required and must match the backend}
      - RAILWAY_BACKEND=${RAILWAY_BACKEND:-https://ecomcookpit-production-0ec4.up.railway.app}
      - ACME_EMAIL=${ACME_EMAIL:-admin@scalor.net}

volumes:
  caddy_data:
  caddy_config:
