[phases.setup]
nixPkgs = [
  "nodejs_22",
  "chromium",
  "glib",
  "nss",
  "atk",
  "at-spi2-atk",
  "cups",
  "libdrm",
  "gtk3",
  "mesa",
  "pango",
  "cairo",
  "libxkbcommon",
  "alsa-lib",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr"
]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"

[phases.install]
cmds = [
  # Install frontend dependencies
  "npm ci",
  # Install backend dependencies (include dev for prisma generate)
  "cd Backend && npm ci --include=dev"
]

[phases.build]
cmds = [
  # Build React frontend (Vite → dist/)
  "npm run build",
  # Copy frontend build to Backend/client/build for storefront serving
  "mkdir -p Backend/client/build",
  "cp -r dist/* Backend/client/build/"
]

[start]
cmd = "cd Backend && node server.js"
