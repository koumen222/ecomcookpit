  <!doctype html>
  <html lang="fr">
    <head>
      <meta charset="UTF-8" />
      <!-- viewport-fit=cover est OBLIGATOIRE pour respecter les safe-area iPhone (Dynamic Island, home bar) -->
      <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
      <title>Scalor — The Operating System for African Ecommerce</title>
      <meta name="description" content="Scalor — Growth. Structure. Intelligence. The Operating System for African Ecommerce." />

      <!-- PWA / Theme -->
      <meta name="theme-color" content="#0F1115" media="(prefers-color-scheme: light)" />
      <meta name="theme-color" content="#0F1115" media="(prefers-color-scheme: dark)" />
      <meta name="mobile-web-app-capable" content="yes" />

      <!-- Apple PWA (iOS Safari) -->
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <!-- black-translucent = contenu passe sous la status bar / Dynamic Island, géré par safe-area-inset -->
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <meta name="apple-mobile-web-app-title" content="Scalor" />
      <meta name="format-detection" content="telephone=no" />

      <!-- Icônes Apple haute résolution -->
      <!-- iPhone 15 Pro @3x = 180pt → 180px pour apple-touch-icon -->
      <link rel="apple-touch-icon" href="/icon.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
      <link rel="apple-touch-icon" sizes="167x167" href="/icon.png" />
      <link rel="apple-touch-icon" sizes="152x152" href="/icon.png" />
      <link rel="apple-touch-icon" sizes="144x144" href="/icon.png" />
      <link rel="apple-touch-icon" sizes="128x128" href="/icon.png" />

      <!-- Manifest PWA -->
      <link rel="manifest" href="/manifest.json" />
      <link rel="icon" type="image/png" href="/icon.png" />

      <!-- DNS prefetch for external domains -->
      <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
      <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
      <link rel="dns-prefetch" href="https://api.fontshare.com" />

      <!-- Preconnect to font origins -->
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="preconnect" href="https://api.fontshare.com" crossorigin />

      <!-- Non-blocking font loading (media=print trick: loads async, swaps when ready) -->
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
      <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800&display=swap" media="print" onload="this.media='all'" />
      <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
        <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800&display=swap" rel="stylesheet" />
      </noscript>

      <!-- Preload critical assets -->
      <link rel="preload" href="/icon.png" as="image" />

      <style>
        /* Safe-area pour iPhone avec Dynamic Island / home indicator */
        :root {
          --sat: env(safe-area-inset-top, 0px);
          --sar: env(safe-area-inset-right, 0px);
          --sab: env(safe-area-inset-bottom, 0px);
          --sal: env(safe-area-inset-left, 0px);
        }
        /* Éviter le flash blanc au chargement */
        html, body, #root {
          margin: 0;
          padding: 0;
          background-color: #0F1115;
          min-height: 100dvh;
          /* dvh = dynamic viewport height, correct sur iOS Safari */
        }
        /* Instant splash screen while React hydrates */
        #root:empty {
          display: flex;
          align-items: center;
          justify-content: center;
          position: fixed;
          inset: 0;
          background: #0F1115;
          z-index: 9999;
        }
        #root:empty::before {
          content: '';
          display: block;
          width: 48px;
          height: 48px;
          border-radius: 50%;
          border: 3px solid rgba(15,107,79,0.2);
          border-top-color: #0F6B4F;
          animation: _splash-spin 0.6s linear infinite;
        }
        @keyframes _splash-spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Defer SW registration to after page is interactive (doesn't compete with main bundle)
    if ('serviceWorker' in navigator) {
      var _swTimer = setTimeout(function() {
        navigator.serviceWorker.register('/sw.js').catch(function(){});
      }, 3000);
      window.addEventListener('load', function() {
        clearTimeout(_swTimer);
        navigator.serviceWorker.register('/sw.js').catch(function(){});
      });
    }
  </script>

</body>
</html>
