name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-vps
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: vars
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            Backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit

      - name: Install backend dependencies
        run: npm ci --prefix Backend --no-audit

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production
          BUILD_VERSION: ${{ github.sha }}
          GIT_COMMIT: ${{ github.sha }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || vars.VITE_BACKEND_URL || 'https://api.scalor.net' }}
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || 'https://api.scalor.net' }}
          VITE_STORE_API_URL: ${{ vars.VITE_STORE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST || 'https://app.posthog.com' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || vars.VITE_BACKEND_URL || 'https://api.scalor.net' }}
            VITE_BACKEND_URL=${{ vars.VITE_BACKEND_URL || 'https://api.scalor.net' }}
            VITE_STORE_API_URL=${{ vars.VITE_STORE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_POSTHOG_KEY=${{ vars.VITE_POSTHOG_KEY }}
            VITE_POSTHOG_HOST=${{ vars.VITE_POSTHOG_HOST || 'https://app.posthog.com' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/ecomcookpit' }}
      IMAGE: ${{ needs.build.outputs.image }}
      APP_TAG: ${{ needs.build.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "$VPS_HOST" || (echo "Missing secret VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "Missing secret VPS_USER" && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "Missing secret VPS_SSH_KEY" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_SSH_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose file
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_DIR'"
          scp -i ~/.ssh/deploy_key -P "$VPS_SSH_PORT" docker-compose.prod.yml "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/docker-compose.yml"

      - name: Pull and restart application
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" \
            "VPS_APP_DIR='$VPS_APP_DIR' IMAGE='$IMAGE' APP_TAG='$APP_TAG' BUILD_VERSION='${{ github.sha }}' GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$VPS_APP_DIR"

          if [ ! -f .env ]; then
            echo "Missing $VPS_APP_DIR/.env on the VPS. Create it from Backend/.env.example before deploying." >&2
            exit 1
          fi

          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          export IMAGE APP_TAG BUILD_VERSION

          docker compose pull app
          docker compose up -d --remove-orphans app
          docker compose ps app

          APP_PORT_VALUE="$(grep -E '^APP_PORT=' .env | tail -n 1 | cut -d '=' -f 2- || true)"
          APP_PORT_VALUE="${APP_PORT_VALUE:-8080}"

          curl --fail --silent --show-error --max-time 15 "http://127.0.0.1:${APP_PORT_VALUE}/health"
          docker image prune -af --filter "until=168h"
          REMOTE
