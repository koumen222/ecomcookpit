services:
  app:
    image: ${IMAGE:-ghcr.io/koumen222/ecomcookpit}:${APP_TAG:-latest}
    container_name: ${APP_CONTAINER_NAME:-ecomcookpit-app}
    restart: unless-stopped
    pull_policy: always
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: production
      PORT: 8080
      BUILD_VERSION: ${BUILD_VERSION:-local}
      GIT_COMMIT: ${BUILD_VERSION:-local}
    ports:
      - "${APP_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ecomcookpit_uploads:/app/Backend/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  ecomcookpit_uploads:
